<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Wizard's Chess — Hogwarts</title>
  <script src="https://aframe.io/releases/1.7.0/aframe.min.js"></script>
  <script src="https://static.sketchfab.com/api/sketchfab-viewer-1.12.1.js"></script>

  <script>
    // ═══════════════════════════════════════════════════════════
    //  GLOBAL STATE FLAGS
    // ═══════════════════════════════════════════════════════════
    // Player is locked in place during the cinematic flyover + chess
    // sequence. The stone-reveal dolly flips this true once it finishes
    // (~12s after revealStoneChamber()), at which point both VR thumbstick
    // movement AND desktop wasd-controls become responsive.
    window.__chamberReady = false;

    // Show / hide the 3D in-scene HUD based on VR mode. On desktop the
    // HTML #hud in the bottom-left is the control reference; the 3D one
    // would just be an intrusive floating banner.
    window.addEventListener('load', function(){
      var scene = document.querySelector('a-scene');
      if (!scene) return;
      scene.addEventListener('enter-vr', function(){
        var el = document.getElementById('vrHud');
        if (el) el.setAttribute('visible', true);
      });
      scene.addEventListener('exit-vr', function(){
        var el = document.getElementById('vrHud');
        if (el) el.setAttribute('visible', false);
      });
    });

    // ═══════════════════════════════════════════════════════════
    //  COMPONENTS
    // ═══════════════════════════════════════════════════════════

    /* Flickering fire */
    AFRAME.registerComponent('flicker', {
      schema: { base:{default:1.5}, range:{default:0.5}, speed:{default:8} },
      tick: function(t) {
        var d=this.data, l=this.el.getObject3D('light');
        if(!l) return;
        l.intensity = Math.max(0.05, d.base
          + Math.sin(t*d.speed*0.001)*d.range*0.5
          + Math.sin(t*d.speed*0.0017+2.3)*d.range*0.3
          + (Math.random()-0.5)*d.range*0.4);
      }
    });

    /* Chess piece material — dark obsidian or light stone */
    /* Unified "sculpted stone" material for every chess piece — old + new set */
    AFRAME.registerComponent('chess-material', {
      schema: { color:{default:'dark'} },
      init: function(){
        var col=this.data.color;
        var el = this.el;
        el.addEventListener('model-loaded', function(){
          var isDark = col==='dark';
          var mat = new THREE.MeshStandardMaterial({
            color:      isDark ? new THREE.Color(0.11,0.115,0.14) : new THREE.Color(0.86,0.80,0.72),
            emissive:   isDark ? new THREE.Color(0.02,0.03,0.05) : new THREE.Color(0.08,0.06,0.04),
            emissiveIntensity: 0.45,
            roughness:  isDark ? 0.55 : 0.62,
            metalness:  isDark ? 0.22 : 0.08,
            envMapIntensity: 1.2
          });
          el.getObject3D('mesh').traverse(function(n){
            if(n.isMesh){
              n.material = mat;
              n.castShadow = true;
              n.receiveShadow = true;
              if (n.geometry) n.geometry.computeVertexNormals();
            }
          });
          // Scale up board pieces for stronger presence; leave trophies + any piece that
          // already has a non-unit scale alone
          var s = el.object3D.scale;
          var isTrophy = (el.id || '').indexOf('trophy-') === 0;
          if (!isTrophy && Math.abs(s.x - 1) < 0.001 && Math.abs(s.y - 1) < 0.001){
            el.object3D.scale.set(1.8, 1.8, 1.8);
          }
        });
      }
    });

    /* Castle material — dark gloomy blue stone */
    AFRAME.registerComponent('school-material', {
      init: function(){
        this.el.addEventListener('model-loaded', function(){
          var mat = new THREE.MeshStandardMaterial({
            color: new THREE.Color(0.14, 0.15, 0.26),
            roughness: 0.75,
            metalness: 0.1,
            envMapIntensity: 1.0
          });
          this.getObject3D('mesh').traverse(function(n){
            if(n.isMesh){
              n.material = mat;
              n.castShadow = true;
              n.receiveShadow = true;
              n.geometry.computeVertexNormals();
            }
          });
        });
      }
    });

    /* ════════════════════════════════════════════
       VR THUMBSTICK LOCOMOTION — reads WebXR gamepads
       Left stick: smooth walk (camera-forward relative).
       Right stick: snap-free horizontal turn.
       Only runs while the player is in VR mode so it doesn't
       interfere with wasd-controls on desktop.
       ════════════════════════════════════════════ */
    AFRAME.registerComponent('vr-thumbstick-move', {
      schema: {
        speed:     {default: 3.0},   // metres per second
        turnSpeed: {default: 90},    // degrees per second
        deadzone:  {default: 0.12}
      },
      init: function(){
        this._fwd   = new THREE.Vector3();
        this._right = new THREE.Vector3();
        this._up    = new THREE.Vector3(0, 1, 0);
        this._camQ  = new THREE.Quaternion();
        // Edge-triggered state for B / Y buttons on each hand so a hold
        // doesn't fire repeatedly.
        this._btnState = { left: { primary:false, secondary:false },
                           right:{ primary:false, secondary:false } };
        // Edge-triggered state for thumbstick horizontal D-pad flicks.
        this._dpadState = { left:false, right:false };
      },
      tick: function(t, dt){
        var sceneEl = this.el.sceneEl;
        if (!sceneEl.is || !sceneEl.is('vr-mode')) return;     // desktop path untouched
        var session = sceneEl.xrSession || (sceneEl.renderer && sceneEl.renderer.xr && sceneEl.renderer.xr.getSession && sceneEl.renderer.xr.getSession());
        if (!session || !session.inputSources) return;
        if (this.el.components.flyover && this.el.components.flyover.active) return;  // don't fight the flyover
        // Lock the user in place until the chamber is revealed and the stone-reveal
        // dolly completes — they should watch the chess cinematic + captions first.
        if (!window.__chamberReady) return;

        var dts = Math.min(0.1, (dt || 16) / 1000);
        var dead = this.data.deadzone;
        var rig = this.el;
        var cam = rig.querySelector('a-camera');
        if (!cam) return;

        for (var i = 0; i < session.inputSources.length; i++){
          var src = session.inputSources[i];
          if (!src.gamepad || !src.gamepad.axes) continue;
          var axes = src.gamepad.axes;
          var buttons = src.gamepad.buttons || [];
          // Most WebXR controllers expose the main thumbstick on axes[2]/axes[3].
          // axes[0]/axes[1] are reserved for the trackpad (legacy) on some devices.
          var ax = axes.length >= 4 ? axes[2] : (axes[0] || 0);
          var ay = axes.length >= 4 ? axes[3] : (axes[1] || 0);

          if (src.handedness === 'left' || src.handedness === 'right') {
            // Edge-triggered button presses.
            // Quest standard mapping: buttons[4] = A/X (primary),
            //                        buttons[5] = B/Y (secondary).
            var prim = buttons[4] && buttons[4].pressed;
            var sec  = buttons[5] && buttons[5].pressed;
            var state = this._btnState[src.handedness];
            if (prim && !state.primary)   this._fireButton(src.handedness, 'primary');
            if (sec  && !state.secondary) this._fireButton(src.handedness, 'secondary');
            state.primary   = prim;
            state.secondary = sec;
          }

          if (src.handedness === 'left') {
            // Edge-triggered D-pad flick — hard left / hard right past 0.7
            // dispatches a 'vr-dpad' event. Only fires once per flick so
            // holding the stick doesn't spam the annotation navigator.
            var flickLeft  = ax < -0.7;
            var flickRight = ax >  0.7;
            if (flickLeft  && !this._dpadState.left)  document.dispatchEvent(new CustomEvent('vr-dpad', {detail:{direction:'left'}}));
            if (flickRight && !this._dpadState.right) document.dispatchEvent(new CustomEvent('vr-dpad', {detail:{direction:'right'}}));
            this._dpadState.left  = flickLeft;
            this._dpadState.right = flickRight;

            if (Math.abs(ax) < dead && Math.abs(ay) < dead) continue;
            cam.object3D.getWorldQuaternion(this._camQ);
            this._fwd.set(0, 0, -1).applyQuaternion(this._camQ); this._fwd.y = 0; this._fwd.normalize();
            this._right.crossVectors(this._fwd, this._up);
            var m = this.data.speed * dts;
            rig.object3D.position.addScaledVector(this._fwd,  -ay * m);
            rig.object3D.position.addScaledVector(this._right, ax * m);
          } else if (src.handedness === 'right') {
            if (Math.abs(ax) < dead) continue;
            var rad = this.data.turnSpeed * Math.PI / 180 * dts;
            rig.object3D.rotation.y -= ax * rad;
          }
        }
      },

      // Dispatch a semantic VR button event that other code can listen for.
      // Mapping:
      //   right / secondary  =  B button  →  "vr-back"   (close portal / return to chamber)
      //   left  / secondary  =  Y button  →  "vr-back"   (mirror of B for left-handed)
      //   *     / primary    =  A or X    →  "vr-action" (reserved; unused for now)
      _fireButton: function(hand, kind){
        if (kind === 'secondary') {
          document.dispatchEvent(new CustomEvent('vr-back', {detail:{hand:hand}}));
        } else {
          document.dispatchEvent(new CustomEvent('vr-action', {detail:{hand:hand}}));
        }
      }
    });

    /* ════════════════════════════════════════════
       BOUNDARY — keeps player inside play area
       ════════════════════════════════════════════ */
    AFRAME.registerComponent('boundary', {
      schema: { minX:{default:-60}, maxX:{default:60}, minZ:{default:-60}, maxZ:{default:60}, minY:{default:0.5}, maxY:{default:40} },
      tick: function(){
        // Don't clamp while the cinematic flyover is still active — it drives the camera to places well outside player bounds
        if (this.el.components.flyover && this.el.components.flyover.active) return;
        var pos = this.el.object3D.position;
        var d = this.data;
        pos.x = Math.max(d.minX, Math.min(d.maxX, pos.x));
        pos.y = Math.max(d.minY, Math.min(d.maxY, pos.y));
        pos.z = Math.max(d.minZ, Math.min(d.maxZ, pos.z));
      }
    });

    /* ════════════════════════════════════════════
       BROOMSTICK FLYOVER — swoops over castle down to board
       ════════════════════════════════════════════ */
    AFRAME.registerComponent('flyover', {
      init: function(){
        this.startTime = 0;
        this.active = true;
        this.duration = 10000;
        // Cinematic waypoints — the "Harry Potter arrival at Hogwarts" sequence
        // Start: high over the lake, castle in the distance
        this.p0 = new THREE.Vector3(-55, 55, -55);  this.l0 = new THREE.Vector3(5, 10, 15);
        // Mid 1: dropping in over the towers, sweeping around
        this.p1 = new THREE.Vector3(-40, 28, -30);  this.l1 = new THREE.Vector3(5, 6, 12);
        // Mid 2: coming over the courtyard wall, pieces visible below
        this.p2 = new THREE.Vector3(-24, 14, -20);  this.l2 = new THREE.Vector3(3, 1, 8);
        // End: the hero shot — board on plaza, castle rising behind
        this.p3 = new THREE.Vector3(-16, 6, -13);   this.l3 = new THREE.Vector3(5, 0.8, 10);
        this.el.object3D.position.copy(this.p0);
        this._cam = this.el.querySelector('a-camera');
        this._cam.setAttribute('look-controls', 'enabled', false);
        this.el.setAttribute('wasd-controls', 'enabled', false);
        this._tmp = new THREE.Vector3();
        // Find the actual three.js PerspectiveCamera (child of a-camera entity)
        this._threeCam = null;
        var self = this;
        this._cam.object3D.traverse(function(o){ if (o.isCamera) self._threeCam = o; });
      },
      // Point the entity so its -Z axis points at the target
      // (A-Frame cameras follow three.js convention: -Z is forward)
      _lookAtEntity: function(entity, target){
        // three.js Object3D.lookAt works correctly for cameras: -Z points at target
        // But A-Frame wraps cameras in an entity whose forward may differ.
        // Directly orient the rig entity so its -Z faces the target, since camera local pos is non-zero but local rot is zero in our setup.
        var pos = new THREE.Vector3();
        entity.object3D.getWorldPosition(pos);
        var m = new THREE.Matrix4();
        m.lookAt(pos, target, new THREE.Vector3(0, 1, 0));
        entity.object3D.quaternion.setFromRotationMatrix(m);
      },
      _bezier3: function(t, p0, p1, p2, p3, out){
        var u = 1 - t;
        var tt = t * t, uu = u * u;
        var uuu = uu * u, ttt = tt * t;
        out.x = uuu*p0.x + 3*uu*t*p1.x + 3*u*tt*p2.x + ttt*p3.x;
        out.y = uuu*p0.y + 3*uu*t*p1.y + 3*u*tt*p2.y + ttt*p3.y;
        out.z = uuu*p0.z + 3*uu*t*p1.z + 3*u*tt*p2.z + ttt*p3.z;
      },
      tick: function(t){
        if(!this.active) return;
        // Hold until the Max McDonough Designs intro finishes
        if(!window.__mmdIntroDone){ this.startTime = 0; return; }
        if(!this.startTime){ this.startTime = t + 800; return; }
        if(t < this.startTime) return;
        var elapsed = t - this.startTime;
        var progress = Math.min(1, elapsed / this.duration);
        // Cubic ease in-out
        var ease = progress < 0.5 ? 4*progress*progress*progress : 1-Math.pow(-2*progress+2,3)/2;
        // Bezier curve through the 4 waypoints — smooth swoop
        var pos = new THREE.Vector3();
        var look = new THREE.Vector3();
        this._bezier3(ease, this.p0, this.p1, this.p2, this.p3, pos);
        this._bezier3(ease, this.l0, this.l1, this.l2, this.l3, look);
        this.el.object3D.position.copy(pos);
        // Rotate the rig itself so camera looks at target (rig contains camera)
        this._lookAtEntity(this.el, look);
        if(progress >= 1){
          this.active = false;
          document.getElementById('hud').style.opacity = '1';
          setTimeout(function(){ document.dispatchEvent(new Event('start-chess')); }, 1800);
          // Keep camera fixed in cinematic pose — don't re-enable look-controls (the view is locked for the show)
        }
      }
    });

    /* ════════════════════════════════════════════
       FLY CONTROLS — Q up, E down
       ════════════════════════════════════════════ */
    AFRAME.registerComponent('fly-controls', {
      schema: { speed:{default:8} },
      init: function(){
        this.keys={};
        var self=this;
        document.addEventListener('keydown', function(e){ self.keys[e.code]=true; });
        document.addEventListener('keyup', function(e){ self.keys[e.code]=false; });
      },
      tick: function(t,dt){
        if(!dt) return;
        var spd = this.data.speed * dt * 0.001;
        var pos = this.el.object3D.position;
        if(this.keys['KeyQ']) pos.y += spd;
        if(this.keys['KeyE']) pos.y -= spd;
      }
    });

    /* ════════════════════════════════════════════
       WIZARD CHESSBOARD
       ════════════════════════════════════════════ */
    AFRAME.registerComponent('wizard-chessboard', {
      schema: { size:{default:8}, squareSize:{default:2.5} },
      init: function(){
        var d=this.data, group=new THREE.Group();
        var darkMat = new THREE.MeshStandardMaterial({ color:new THREE.Color(0.05,0.08,0.22), roughness:0.25, metalness:0.15 });
        var lightMat = new THREE.MeshStandardMaterial({ color:new THREE.Color(0.65,0.62,0.58), roughness:0.30, metalness:0.08 });
        var geo = new THREE.BoxGeometry(d.squareSize, 0.2, d.squareSize);
        var half = d.size/2;
        for(var r=0;r<d.size;r++){
          for(var c=0;c<d.size;c++){
            var isDark = (r+c)%2===0;
            var tile = new THREE.Mesh(geo, isDark?darkMat:lightMat);
            tile.position.set((c-half+0.5)*d.squareSize, 0, (r-half+0.5)*d.squareSize);
            tile.receiveShadow=true;
            group.add(tile);
          }
        }
        // Stone platform beneath the board
        var platMat = new THREE.MeshStandardMaterial({color:new THREE.Color(0.08,0.08,0.10), roughness:0.7, metalness:0.05});
        var platGeo = new THREE.BoxGeometry(d.size*d.squareSize+2, 0.5, d.size*d.squareSize+2);
        var plat = new THREE.Mesh(platGeo, platMat);
        plat.position.y = -0.35;
        plat.receiveShadow = true;
        group.add(plat);
        this.el.setObject3D('mesh',group);
      }
    });

    /* ════════════════════════════════════════════
       FIRE BRAZIER
       ════════════════════════════════════════════ */
    AFRAME.registerComponent('brazier', {
      init: function(){
        var group=new THREE.Group();
        var mat=new THREE.MeshStandardMaterial({color:new THREE.Color(0.08,0.07,0.06),roughness:0.75,metalness:0.1});
        var base=new THREE.Mesh(new THREE.CylinderGeometry(0.3,0.4,1.0,8),mat);
        base.position.set(0,0.5,0); group.add(base);
        var bowl=new THREE.Mesh(new THREE.CylinderGeometry(0.6,0.35,0.5,8,1,true),mat);
        bowl.position.set(0,1.05,0); group.add(bowl);
        var fm=new THREE.MeshBasicMaterial({color:new THREE.Color(1,0.6,0.15),transparent:true,opacity:0.7});
        this.fire=new THREE.Mesh(new THREE.SphereGeometry(0.3,6,6),fm);
        this.fire.position.y=1.2;this.fire.scale.y=1.4;group.add(this.fire);
        var tm=new THREE.MeshBasicMaterial({color:new THREE.Color(1,0.3,0.05),transparent:true,opacity:0.5});
        this.tip=new THREE.Mesh(new THREE.ConeGeometry(0.18,0.5,6),tm);
        this.tip.position.y=1.55;group.add(this.tip);
        this.fm=fm;
        this.el.setObject3D('mesh',group);
      },
      tick:function(t){
        if(!this.fire)return;
        var s=0.9+Math.sin(t*0.008)*0.15+Math.sin(t*0.013)*0.1;
        this.fire.scale.set(s,1.2+Math.sin(t*0.01)*0.2,s);
        this.tip.scale.set(s*0.8,1+Math.sin(t*0.015)*0.3,s*0.8);
        this.tip.position.y=1.55+Math.sin(t*0.009)*0.08;
        this.fm.opacity=0.5+Math.sin(t*0.012)*0.2;
      }
    });

    /* Procedural Pawn */
    AFRAME.registerComponent('pawn', {
      schema:{color:{default:'dark'}},
      init:function(){
        var isDark=this.data.color==='dark';
        var mat=new THREE.MeshStandardMaterial({
          color:isDark?new THREE.Color(0.06,0.065,0.09):new THREE.Color(0.72,0.68,0.62),
          roughness:isDark?0.35:0.42,metalness:isDark?0.25:0.12
        });
        var g=new THREE.Group();
        var p1=new THREE.Mesh(new THREE.CylinderGeometry(0.35,0.45,0.3,10),mat); p1.position.set(0,0.15,0); g.add(p1);
        var p2=new THREE.Mesh(new THREE.CylinderGeometry(0.22,0.32,1.0,10),mat); p2.position.set(0,0.8,0); g.add(p2);
        var p3=new THREE.Mesh(new THREE.SphereGeometry(0.22,10,10),mat); p3.position.set(0,1.5,0); g.add(p3);
        var p4=new THREE.Mesh(new THREE.BoxGeometry(0.35,0.5,0.06),mat); p4.position.set(-0.3,0.9,0); g.add(p4);
        this.el.setObject3D('mesh',g);
      }
    });

    /* Procedural Rook */
    AFRAME.registerComponent('rook', {
      schema:{color:{default:'dark'}},
      init:function(){
        var isDark=this.data.color==='dark';
        var mat=new THREE.MeshStandardMaterial({
          color:isDark?new THREE.Color(0.06,0.065,0.09):new THREE.Color(0.72,0.68,0.62),
          roughness:isDark?0.35:0.42,metalness:isDark?0.25:0.12
        });
        var g=new THREE.Group();
        var r1=new THREE.Mesh(new THREE.CylinderGeometry(0.45,0.55,0.35,10),mat); r1.position.set(0,0.175,0); g.add(r1);
        var r2=new THREE.Mesh(new THREE.CylinderGeometry(0.35,0.4,1.6,10),mat); r2.position.set(0,1.15,0); g.add(r2);
        var r3=new THREE.Mesh(new THREE.CylinderGeometry(0.45,0.38,0.2,10),mat); r3.position.set(0,2.0,0); g.add(r3);
        for(var i=0;i<5;i++){
          var a=i/5*Math.PI*2;
          var m=new THREE.Mesh(new THREE.BoxGeometry(0.14,0.25,0.14),mat);
          m.position.set(Math.cos(a)*0.38,2.25,Math.sin(a)*0.38);g.add(m);
        }
        this.el.setObject3D('mesh',g);
      }
    });

    /* ════════════════════════════════════════════
       CHESS GAME — pieces move like in the movie
       ════════════════════════════════════════════ */
    AFRAME.registerComponent('chess-game', {
      init: function(){
        this.moves = [
          // [pieceId, toX, toZ, duration, captureId]
          // Opening: white pawn advances
          {piece:'wp-e', tx:1.25, tz:1.25, dur:1800, delay:0},
          // Black pawn responds
          {piece:'bp-d', tx:-1.25, tz:-1.25, dur:1800, delay:2200},
          // White pawn attacks
          {piece:'wp-d', tx:-1.25, tz:1.25, dur:2000, delay:4500},
          // Black knight jumps
          {piece:'dk-b', tx:-3.75, tz:-3.75, dur:2200, delay:7000},
          // White bishop slides
          {piece:'lb-c', tx:1.25, tz:3.75, dur:2000, delay:9500},
          // Black rook charges across — CAPTURES white pawn (dramatic smash!)
          {piece:'dr-a', tx:-8.75, tz:1.25, dur:2500, delay:12000, capture:'wp-d', smash:true},
          // White knight repositions
          {piece:'lk-b', tx:-3.75, tz:3.75, dur:2000, delay:15000},
          // Ron's sacrifice — white knight moves into danger
          {piece:'lk-g', tx:3.75, tz:-1.25, dur:2500, delay:17500, heroic:true},
          // Black queen captures Ron's knight (the sacrifice!)
          {piece:'dq', tx:3.75, tz:-1.25, dur:3000, delay:20500, capture:'lk-g', smash:true},
          // Harry (white bishop) makes the winning move
          {piece:'lb-f', tx:-1.25, tz:-6.25, dur:2000, delay:24000, heroic:true},
        ];
        this.started = false;
        this.moveIndex = 0;
        this.currentMove = null;
        this.moveStartTime = 0;
        this.gameStartTime = 0;
        var self = this;
        document.addEventListener('start-chess', function(){
          self.started = true;
          self.gameStartTime = performance.now();
        });
      },
      tick: function(t){
        if(!this.started) return;
        var elapsed = t - this.gameStartTime;

        // Process moves based on timing
        for(var i = 0; i < this.moves.length; i++){
          var move = this.moves[i];
          if(move.done) continue;
          if(elapsed < move.delay) continue;

          var moveElapsed = elapsed - move.delay;
          var progress = Math.min(1, moveElapsed / move.dur);
          // Smooth ease
          var ease = progress < 0.5 ? 2*progress*progress : 1-Math.pow(-2*progress+2,2)/2;

          var el = document.getElementById(move.piece);
          if(!el) { move.done = true; continue; }

          if(!move.startPos){
            move.startPos = {x: el.object3D.position.x, z: el.object3D.position.z};
          }

          // Slide piece
          var nx = move.startPos.x + (move.tx - move.startPos.x) * ease;
          var nz = move.startPos.z + (move.tz - move.startPos.z) * ease;

          // Add a slight hop for knights, dramatic slide for others
          var hop = 0;
          if(move.piece.indexOf('k-') > -1){
            hop = Math.sin(progress * Math.PI) * 1.5; // knights jump
          }

          el.object3D.position.x = nx;
          el.object3D.position.z = nz;
          el.object3D.position.y = 0.1 + hop;

          // Capture: smash the target piece
          if(move.capture && progress > 0.85 && !move.captured){
            move.captured = true;
            var target = document.getElementById(move.capture);
            if(target){
              // Dramatic destruction — piece falls over and fades
              target.setAttribute('animation__fall', 'property:rotation; to:90 0 0; dur:600; easing:easeInQuad');
              target.setAttribute('animation__sink', 'property:position; to:'+target.object3D.position.x+' -2 '+target.object3D.position.z+'; dur:1200; delay:400; easing:easeInQuad');

              // Dispatch a semantic event for characters listening for their piece's destruction
              if (move.capture === 'lk-g') {
                document.dispatchEvent(new CustomEvent('ron-falls'));
              }
            }
          }

          // Final checkmate move — fire event so king's sword falls
          if(move.piece === 'lb-f' && progress > 0.85 && !move.kingBroken){
            move.kingBroken = true;
            document.dispatchEvent(new CustomEvent('king-defeated'));
          }

          // Heroic glow for key pieces
          if(move.heroic && !move.glowed && progress > 0.1){
            move.glowed = true;
            // brief flash on heroic moves would go here
          }

          if(progress >= 1){
            move.done = true;
          }
        }
      }
    });

          var top = new THREE.Mesh(new THREE.CylinderGeometry(0.75, 0.55, 0.25, 12), pedMat);
          top.position.set(pp[0], 2.45, pp[2]); group.add(top);
          var base = new THREE.Mesh(new THREE.CylinderGeometry(0.75, 0.9, 0.35, 12), pedMat);
          base.position.set(pp[0], 0.17, pp[2]); group.add(base);
        }

        this.el.setObject3D('chamber', group);
      },
      tick: function(t){
        if (this._stone){
          this._stone.rotation.y = t * 0.0006;
          this._stone.rotation.x = Math.sin(t * 0.0008) * 0.2;
          var pulse = 0.85 + Math.sin(t * 0.003) * 0.15;
          if (this._auraMat)  this._auraMat.opacity  = 0.22 * pulse + 0.10;
          if (this._aura2Mat) this._aura2Mat.opacity = 0.10 * pulse + 0.06;
          if (this._stoneLight) this._stoneLight.intensity = 3.2 + Math.sin(t * 0.003) * 1.2;
        }
        // Candles: subtle bob + flame flicker
        if (this._candles){
          for (var i = 0; i < this._candles.length; i++){
            var c = this._candles[i];
            c.group.position.y = c.baseY + Math.sin(t * 0.0008 * c.speed + c.phase) * 0.15;
            var f = 0.85 + Math.sin(t * 0.01 + c.phase) * 0.15;
            c.flame.scale.set(f, 1 + f * 0.3, f);
            c.flameMat.opacity = 0.75 + Math.sin(t * 0.012 + c.phase) * 0.18;
            c.light.intensity = 0.4 + Math.sin(t * 0.011 + c.phase) * 0.2;
          }
        }
        // Dust drift
        if (this._dust){
          this._dust.rotation.y = t * 0.00005;
        }
      }
    });

    /* Portal door — a stone archway with two oak leaves that swing open
       when the rig approaches. Door auto-fires the 'open-portal' event when fully open. */
    AFRAME.registerComponent('portal-door', {
      schema: {
        label: {default: 'DOOR'},
        destination: {default: ''},
        accent: {type:'color', default:'#ffcf70'},
        triggerDistance: {default: 7.0}
      },
      init: function(){
        var label = this.data.label;
        var dest = this.data.destination;
        var accentCol = new THREE.Color(this.data.accent);

        var goldMat = new THREE.MeshStandardMaterial({
          color: accentCol.clone().multiplyScalar(0.95),
          emissive: accentCol.clone().multiplyScalar(0.35),
          emissiveIntensity: 0.9,
          roughness: 0.28, metalness: 0.85
        });
        var stoneMat = new THREE.MeshStandardMaterial({
          color: new THREE.Color(0.22, 0.19, 0.17),
          roughness: 0.9, metalness: 0.06
        });
        var oakMat = new THREE.MeshStandardMaterial({
          color: new THREE.Color(0.28, 0.18, 0.10),
          roughness: 0.75, metalness: 0.08,
          emissive: new THREE.Color(0.04, 0.02, 0.01), emissiveIntensity: 0.5
        });
        var glowMat = new THREE.MeshBasicMaterial({
          color: accentCol.clone().lerp(new THREE.Color(1,1,1), 0.35),
          transparent: true, opacity: 0.0
        });

        var g = new THREE.Group();

        // ─── Stone frame ───
        var postGeo = new THREE.BoxGeometry(0.35, 5.0, 0.35);
        var pL = new THREE.Mesh(postGeo, stoneMat); pL.position.set(-1.6, 2.5, 0); g.add(pL);
        var pR = new THREE.Mesh(postGeo, stoneMat); pR.position.set( 1.6, 2.5, 0); g.add(pR);
        var topBeam = new THREE.Mesh(new THREE.BoxGeometry(3.6, 0.35, 0.5), stoneMat);
        topBeam.position.set(0, 5.0, 0); g.add(topBeam);
        // Gilded trim
        var trimTop = new THREE.Mesh(new THREE.BoxGeometry(3.6, 0.10, 0.6), goldMat);
        trimTop.position.set(0, 4.78, 0); g.add(trimTop);

        // ─── Glow pane — hidden behind the doors, revealed when they swing open ───
        var pane = new THREE.Mesh(new THREE.PlaneGeometry(3.0, 4.6), glowMat);
        pane.position.set(0, 2.4, 0.01);
        g.add(pane);

        // ─── Door leaves — two vertical oak panels that hinge outward ───
        var leafGeo = new THREE.BoxGeometry(1.45, 4.5, 0.15);
        // Left leaf hinges on its LEFT edge (-x of leaf geometry), so we offset geometry
        var leafGeoL = new THREE.BoxGeometry(1.45, 4.5, 0.15);
        leafGeoL.translate(0.725, 0, 0);  // origin at left edge
        var leafGeoR = new THREE.BoxGeometry(1.45, 4.5, 0.15);
        leafGeoR.translate(-0.725, 0, 0); // origin at right edge

        var leafL = new THREE.Mesh(leafGeoL, oakMat);
        leafL.position.set(-1.45, 2.4, 0.05);
        leafL.castShadow = true;
        g.add(leafL);
        var leafR = new THREE.Mesh(leafGeoR, oakMat);
        leafR.position.set(1.45, 2.4, 0.05);
        leafR.castShadow = true;
        g.add(leafR);

        // Simple iron handles / hinges for detail
        var ironMat = new THREE.MeshStandardMaterial({
          color: new THREE.Color(0.15,0.12,0.10), roughness:0.5, metalness:0.8
        });
        var knobGeo = new THREE.SphereGeometry(0.09, 10, 8);
        var knobL = new THREE.Mesh(knobGeo, ironMat); knobL.position.set(1.28, 2.4, 0.10); leafL.add(knobL);
        var knobR = new THREE.Mesh(knobGeo, ironMat); knobR.position.set(-1.28, 2.4, 0.10); leafR.add(knobR);

        // ─── Dust motes — puff outward when the doors swing open ───
        var DUST_COUNT = 110;
        var dustGeo = new THREE.BufferGeometry();
        var dustPos = new Float32Array(DUST_COUNT * 3);
        for (var di = 0; di < DUST_COUNT; di++) { dustPos[di*3+1] = -999; }
        dustGeo.setAttribute('position', new THREE.BufferAttribute(dustPos, 3));
        var dustMat = new THREE.PointsMaterial({
          color: new THREE.Color(0.82, 0.71, 0.54),
          size: 0.09, transparent: true, opacity: 0,
          depthWrite: false, sizeAttenuation: true
        });
        var dustPoints = new THREE.Points(dustGeo, dustMat);
        g.add(dustPoints);
        this._dustPoints  = dustPoints;
        this._dustMat     = dustMat;
        this._dustPosAttr = dustGeo.attributes.position;
        this._dustVel     = new Float32Array(DUST_COUNT * 3);
        this._dustLife    = new Float32Array(DUST_COUNT);
        this._dustCount   = DUST_COUNT;
        this._dustActiveT = 0;

        // Interior portal light — stays dim until door opens
        var portalLight = new THREE.PointLight(accentCol.getHex(), 0.0, 14, 1.4);
        portalLight.position.set(0, 2.6, 0.8); g.add(portalLight);

        // ─── Label above the door ───
        var canvas = document.createElement('canvas');
        canvas.width = 512; canvas.height = 128;
        var ctx = canvas.getContext('2d');
        ctx.fillStyle = 'rgba(0,0,0,0.0)'; ctx.fillRect(0,0,512,128);
        ctx.fillStyle = '#' + accentCol.getHexString();
        ctx.font = '600 48px "Cormorant Garamond", Georgia, serif';
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.shadowColor = '#' + accentCol.getHexString(); ctx.shadowBlur = 18;
        ctx.fillText(label, 256, 64);
        var tex = new THREE.CanvasTexture(canvas);
        tex.anisotropy = 4;
        var labelMat = new THREE.MeshBasicMaterial({ map: tex, transparent: true });
        var labelMesh = new THREE.Mesh(new THREE.PlaneGeometry(3.2, 0.8), labelMat);
        labelMesh.position.set(0, 5.6, 0.1);
        g.add(labelMesh);

        this.el.setObject3D('door', g);
        this._pane = pane;
        this._glowMat = glowMat;
        this._leafL = leafL;
        this._leafR = leafR;
        this._portalLight = portalLight;

        // Animation state
        this._openProgress = 0;     // 0=closed, 1=open
        this._state = 'closed';     // closed | opening | open | closing
        this._prevState = 'closed'; // for rising-edge FX trigger
        this._rig = document.getElementById('rig');
        this._worldPos = new THREE.Vector3();
        this._rigPos = new THREE.Vector3();

        // Listen for portal close (user clicked back) so we can close the doors
        var self = this;
        document.addEventListener('portal-closed', function(evt){
          if (!evt.detail || evt.detail.destination === dest) {
            self._state = 'closing';
            self._armedAt = null;  // re-arm so another approach re-opens
          }
        });

        // Click still works as a manual trigger (cursor over the door)
        this.el.setAttribute('class', 'clickable-door');
        this.el.addEventListener('click', function(){
          if (self._state === 'closed') self._state = 'opening';
        });
      },
      tick: function(t, dt){
        var data = this.data;

        // Distance check — only relevant when the chamber is on-screen
        if (this._state === 'closed' && this.el.object3D.visible) {
          this.el.object3D.getWorldPosition(this._worldPos);
          if (this._rig) {
            this._rig.object3D.getWorldPosition(this._rigPos);
            var d = this._worldPos.distanceTo(this._rigPos);
            if (d < data.triggerDistance) this._state = 'opening';
          }
        }

        // Rising-edge FX — fire audio + dust burst exactly once when opening begins
        if (this._state === 'opening' && this._prevState !== 'opening' && this._prevState !== 'open') {
          this._triggerOpenFX();
        }
        this._prevState = this._state;

        // Advance open/close progress
        var step = (dt || 16) / 1400;  // ~1.4 s to fully open
        if (this._state === 'opening') {
          this._openProgress = Math.min(1, this._openProgress + step);
          if (this._openProgress >= 1) {
            this._state = 'open';
            // fire the portal event once doors are fully open
            var self = this;
            setTimeout(function(){
              document.dispatchEvent(new CustomEvent('open-portal', {
                detail: { destination: data.destination, label: data.label }
              }));
            }, 250);
          }
        } else if (this._state === 'closing') {
          this._openProgress = Math.max(0, this._openProgress - step);
          if (this._openProgress <= 0) this._state = 'closed';
        }

        // Apply visuals
        var p = this._openProgress;
        // ease for nicer motion
        var ease = p < 0.5 ? 2*p*p : 1 - Math.pow(-2*p+2, 2)/2;
        var swing = ease * (Math.PI * 0.78);  // open ~140°
        if (this._leafL) this._leafL.rotation.y =  swing;
        if (this._leafR) this._leafR.rotation.y = -swing;
        if (this._glowMat) this._glowMat.opacity = Math.max(0, ease - 0.1) * 0.75;
        if (this._portalLight) this._portalLight.intensity = ease * 2.4;

        // Subtle idle flicker on the interior light once fully open
        if (this._state === 'open' && this._portalLight) {
          this._portalLight.intensity = 2.4 + Math.sin(t * 0.004) * 0.35;
        }

        // Dust motes — advance positions, drag + settle, fade out
        if (this._dustActiveT > 0) {
          var dts = (dt || 16) / 1000;
          this._dustActiveT += dts;
          var dpos = this._dustPosAttr.array;
          var dvel = this._dustVel;
          var dlife = this._dustLife;
          var dn = this._dustCount;
          var anyAlive = false;
          for (var k = 0; k < dn; k++) {
            if (dlife[k] <= 0) continue;
            var k3 = k * 3;
            dpos[k3]   += dvel[k3]   * dts;
            dpos[k3+1] += dvel[k3+1] * dts;
            dpos[k3+2] += dvel[k3+2] * dts;
            dvel[k3]   *= 0.955;
            dvel[k3+2] *= 0.955;
            dvel[k3+1] = dvel[k3+1] * 0.985 - 0.18 * dts;
            dlife[k] -= dts;
            if (dlife[k] > 0) anyAlive = true;
          }
          this._dustPosAttr.needsUpdate = true;
          var dt01 = Math.min(1, this._dustActiveT / 2.0);
          this._dustMat.opacity = 0.80 * (1 - dt01 * dt01);
          if (!anyAlive || this._dustActiveT > 2.2) {
            this._dustActiveT = 0;
            this._dustMat.opacity = 0;
          }
        }
      },

      // Fire audio cue + dust burst once per door-open event
      _triggerOpenFX: function(){
        try { window.dispatchEvent(new CustomEvent('door-open-sound')); } catch(e){}
        if (!this._dustPosAttr) return;
        var n = this._dustCount;
        var pos = this._dustPosAttr.array;
        var vel = this._dustVel;
        var life = this._dustLife;
        for (var i = 0; i < n; i++) {
          var i3 = i * 3;
          var xSeed = (Math.random() - 0.5) * 2.2;
          pos[i3]   = xSeed;
          pos[i3+1] = 0.3 + Math.random() * 4.3;
          pos[i3+2] = 0.15 + Math.random() * 0.15;
          var dir = xSeed >= 0 ? 1 : -1;
          vel[i3]   = dir * (0.5 + Math.random() * 1.1);
          vel[i3+1] = 0.25 + Math.random() * 0.6;
          vel[i3+2] = 0.3  + Math.random() * 0.6;
          life[i]   = 1.3  + Math.random() * 1.0;
        }
        this._dustPosAttr.needsUpdate = true;
        this._dustMat.opacity = 0.80;
        this._dustActiveT = 0.001;
      }
    });

    /* Slow camera dolly once the chamber is revealed */
    AFRAME.registerComponent('stone-reveal', {
      init: function(){
        this._active = false;
        this._t0 = 0;
      },
      trigger: function(){
        this._active = true;
        this._t0 = performance.now();
      },
      tick: function(t){
        if (!this._active) return;
        var rig = document.getElementById('rig');
        if (!rig) return;
        var elapsed = performance.now() - this._t0;
        var dur = 11000;
        var p = Math.min(1, elapsed / dur);
        var ease = p < 0.5 ? 2*p*p : 1 - Math.pow(-2*p+2,2)/2;
        // Dolly from (0,1.6,-6) in toward the stone at (0, 1.2, CW-4.2≈17.8)
        var z0 = -6, z1 = 12;
        rig.object3D.position.z = z0 + (z1 - z0) * ease;
        rig.object3D.position.y = 1.6 + Math.sin(p * Math.PI) * 0.3;
        // Hand control back to the player as soon as the dolly completes.
        // Without this, every subsequent tick keeps re-writing position.z
        // and position.y, which felt like invisible walls in the chamber.
        if (p >= 1) {
          this._active = false;
          window.__chamberReady = true;
          // Update the in-scene VR HUD to the full controls list now that
          // the player can move.
          var vrText = document.getElementById('vrHudText');
          if (vrText) {
            vrText.setAttribute('value',
              'L-stick walk  •  R-stick turn  •  A open door / tour trophies  •  L-stick L/R cycle waypoints');
          }
        }
      }
    });

    /* Starfield — a sphere of bright Points far away */
    AFRAME.registerComponent('starfield', {
      init: function(){
        var geo = new THREE.BufferGeometry();
        var count = 1400;
        var pos = new Float32Array(count * 3);
        var col = new Float32Array(count * 3);
        for (var i = 0; i < count; i++) {
          var theta = Math.random() * Math.PI * 2;
          var phi = Math.acos(2 * Math.random() - 1);
          var r = 220 + Math.random() * 20;
          pos[i*3+0] = r * Math.sin(phi) * Math.cos(theta);
          pos[i*3+1] = Math.abs(r * Math.cos(phi)) * 0.85 + 20;  // keep stars above horizon mostly
          pos[i*3+2] = r * Math.sin(phi) * Math.sin(theta);
          var b = 0.55 + Math.random() * 0.45;
          // slight color variation: some stars warmer, some cooler
          var tint = Math.random();
          col[i*3+0] = b * (tint < 0.3 ? 1.0 : 0.85);
          col[i*3+1] = b * 0.92;
          col[i*3+2] = b * (tint > 0.7 ? 1.0 : 0.85);
        }
        geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
        geo.setAttribute('color', new THREE.BufferAttribute(col, 3));
        var mat = new THREE.PointsMaterial({
          size: 1.1, vertexColors: true, sizeAttenuation: true,
          transparent: true, opacity: 0.9, depthWrite: false
        });
        var stars = new THREE.Points(geo, mat);
        this.el.setObject3D('stars', stars);
        this._stars = stars;
      },
      tick: function(t){
        if (!this._stars) return;
        // subtle twinkle
        this._stars.material.opacity = 0.75 + Math.sin(t * 0.0008) * 0.1;
      }
    });

    /* Renderer setup */
    AFRAME.registerComponent('render-setup',{
      init:function(){
        this.el.addEventListener('loaded',function(){
          var r=this.renderer;
          r.toneMapping=THREE.ACESFilmicToneMapping;
          r.toneMappingExposure=1.8;
          r.shadowMap.enabled=true;
          r.shadowMap.type=THREE.PCFSoftShadowMap;
        });
      }
    });
  </script>

      color:#ffd080;padding:10px 20px;border-radius:3px;
      font-family:'Cormorant Garamond',Georgia,serif;
      font-size:.72rem;letter-spacing:.3em;text-transform:uppercase;
      transition:background .2s,transform .2s;
    }
    #portal-overlay .portal-back:hover{
      background:rgba(40,30,20,.9);transform:translateX(-3px);
    }
    #portal-overlay iframe{
      flex:1;width:100%;height:100%;border:0;background:#000;
    }

    /* Controls HUD — small, pinned to the bottom-left, always visible. */
    #hud{
      position:fixed;bottom:12px;left:12px;z-index:100;
      font-family:Georgia,serif;color:rgba(200,210,220,.88);
      background:rgba(0,0,0,.58);padding:7px 12px;border-radius:4px;
      backdrop-filter:blur(8px);border:1px solid rgba(230,180,110,.16);
      opacity:0;transition:opacity 1.2s ease;
      max-width:360px;text-align:left;
      box-shadow:0 2px 12px rgba(0,0,0,.4);
    }
    #hud .hud-row{
      display:flex;flex-direction:column;gap:4px;
      font-size:.58rem;letter-spacing:.05em;line-height:1.4;
    }
    #hud .hud-block{display:flex;flex-direction:column;min-width:0}
    #hud .hud-label{
      font-size:.46rem;letter-spacing:.22em;text-transform:uppercase;
      color:rgba(230,180,110,.85);margin-bottom:1px;font-family:'Inter',sans-serif;font-weight:600;
    }
    #hud .hud-line{color:rgba(220,228,235,.86)}
    #hud .hud-line b{color:#ffd080;font-weight:600}
    #hud .divider{display:none}
    #hud.fade{opacity:0!important;pointer-events:none}
    #vig{position:fixed;inset:0;z-index:50;pointer-events:none;
      background:radial-gradient(ellipse at center,transparent 45%,rgba(0,0,10,.55) 100%)}
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>

<!-- Max McDonough Designs — dark cinematic title card with rising embers -->
<div id="mmdIntro">
  <div class="embers" id="emberField"></div>
  <div class="card card-1">
    <div class="maker">Max McDonough Designs</div>
    <div class="hairline"></div>
    <div class="presents">— presents —</div>
  </div>
  <div class="card card-2">
    <div class="title">Wizard's Chess</div>
    <div class="subtitle">The Path to the Philosopher's Stone</div>
  </div>
</div>

<!-- Narrative overlays -->
<div class="caption" id="cap"></div>
<div id="blackout"></div>
<div id="stoneTitle"></div>

<!-- Sketchfab portal overlay — steps into the Great Hall / Dumbledore's Office -->
<div id="portal-overlay">
  <div class="portal-header">
    <div class="portal-title" id="portal-title">Portal</div>
    <button class="portal-back" id="portal-back">&#x2190; Back to the Chamber</button>
  </div>
  <iframe id="portal-iframe" allow="autoplay; fullscreen; xr-spatial-tracking" allowfullscreen></iframe>
</div>
<div id="vig"></div>
<div id="hud">
  <div class="hud-row">
    <div class="hud-block">
      <div class="hud-label">Laptop</div>
      <div class="hud-line"><b>WASD</b> walk &middot; <b>Mouse</b> look &middot; <b>T</b> tour trophies &middot; <b>Click</b> a door</div>
      <div class="hud-line"><b>&larr; &rarr;</b> cycle waypoints inside a portal</div>
    </div>
    <div class="hud-block" style="margin-top:4px">
      <div class="hud-label">VR Headset</div>
      <div class="hud-line"><b>L-stick</b> walk &middot; <b>R-stick</b> turn &middot; <b>A</b> door / trophy tour</div>
      <div class="hud-line"><b>L-stick &larr; &rarr;</b> cycle waypoints in a portal</div>
    </div>
  </div>
</div>

<a-scene
  renderer="antialias:true; colorManagement:true; physicallyCorrectLights:true"
  vr-mode-ui="enabled:true; enterVRButton:''"
  loading-screen="enabled:false"
  fog="type:exponential; color:#020210; density:0.0025"
  shadow="type:pcfsoft"
  render-setup
  chess-game
  webxr="requiredFeatures:local-floor; optionalFeatures:bounded-floor,hand-tracking"
>
  <a-assets timeout="45000">
    <a-asset-item id="castle-glb" src="hogwarts_ny7.glb"></a-asset-item>
    <!-- Original "printable" set — preserved and now used for the trophies in the chamber -->
    <a-asset-item id="king-printable"   src="King_printable.glb"></a-asset-item>
    <a-asset-item id="queen-printable"  src="Queen_printable.glb"></a-asset-item>
    <a-asset-item id="bishop-printable" src="Bishop_printable.glb"></a-asset-item>
    <a-asset-item id="knight-printable" src="Knight_printable.glb"></a-asset-item>
    <!-- New Max McDonough "magnet" set — the primary gameplay pieces -->
    <a-asset-item id="king-glb"   src="King_magnet.glb"></a-asset-item>
    <a-asset-item id="queen-glb"  src="Queen_magnet.glb"></a-asset-item>
    <a-asset-item id="bishop-glb" src="Bishop_magnet.glb"></a-asset-item>
    <a-asset-item id="knight-glb" src="Knight_magnet.glb"></a-asset-item>
    <a-asset-item id="rook-glb"   src="Rook_magnet.glb"></a-asset-item>
    <a-asset-item id="pawn-glb"   src="Pawn_magnet.glb"></a-asset-item>
  </a-assets>


  <!-- ═══════════════════════════════════════════════════════ -->
  <!--  HOGWARTS CASTLE — NY7 model (Y-up, centered X/Z)      -->
  <!--  Native: 172(X) x 121(Y-height) x 240(Z)              -->
  <!--  Scale 0.2 → 34 x 24 x 48 world units                 -->
  <!--  Board (20x20) centered inside the castle footprint    -->
  <!-- ═══════════════════════════════════════════════════════ -->

  <!-- Castle positioned as a backdrop behind the chess board on open ground -->
  <!-- Board stays at world origin; castle pushed back in +Z with bottom at Y=0 -->
  <a-entity
    gltf-model="#castle-glb"
    school-material
    position="0 0 38"
    rotation="0 0 0"
    scale="0.22 0.22 0.22"
  ></a-entity>

  <!-- STONE CHAMBER — disabled; board now sits on the castle's own courtyard plaza -->
  <!-- <a-entity stone-chamber></a-entity> -->

  <!-- Subtle stone platform under the board (just a touch of bedding) -->
  <a-entity id="outdoorPlatform" position="0 -0.05 0">
    <a-box width="22" height="0.1" depth="22"
      material="color:#0a0a12; roughness:0.95; metalness:0.02"
      shadow="receive:true"></a-box>
  </a-entity>

  <!-- Dark ground beneath everything -->
  <a-plane id="outdoorGround" position="0 -0.55 0" rotation="-90 0 0" width="250" height="250"
    material="color:#040410; roughness:0.92; metalness:0.02"
    shadow="receive:true"></a-plane>


  <!-- ═══════════════════════════════════════════════════════ -->
  <!--  WIZARD'S CHESSBOARD — in the courtyard                -->
  <!-- ═══════════════════════════════════════════════════════ -->

  <a-entity position="0 0.05 0" wizard-chessboard="size:8; squareSize:2.5"></a-entity>


  <!-- ═══════════════════════════════════════════════════════ -->
  <!--  CHESS PIECES — giant, like the movie                  -->
  <!--  IDs used by chess-game component for animation        -->
  <!--  sq = squareSize 2.5, positions = (col-4+0.5)*2.5     -->
  <!-- ═══════════════════════════════════════════════════════ -->

  <!-- DARK SIDE (far/north, z = -8.75 back row, -6.25 pawns) -->
  <!-- Back row -->
  <!-- King's sword — rests on the black king, falls at checkmate -->
  <a-entity id="dk-sword" kings-sword position="1.25 2.35 -8.75"></a-entity>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!--  CHARACTER SILHOUETTES — scaled as riders atop pieces   -->
  <!--  Ron rides the knight that sacrifices itself (lk-g)     -->
  <!--  Harry rides the bishop that delivers checkmate (lb-f)  -->
  <!--  Hermione stands on the rook (lr-a)                     -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <a-entity id="char-hermione" student="who:hermione" scale="0.75 0.75 0.75" follow-piece="target:#lr-a; offset:0 1.9 0"></a-entity>
  <a-entity id="char-ron"      student="who:ron"      scale="0.75 0.75 0.75" follow-piece="target:#lk-g; offset:0 2.0 0"></a-entity>
  <a-entity id="char-harry"    student="who:harry"    scale="0.75 0.75 0.75" follow-piece="target:#lb-f; offset:0 2.0 0"></a-entity>

  <a-entity id="dr-a" gltf-model="#rook-glb"   position="-8.75 0.1 -8.75" chess-material="color:dark"></a-entity>
  <a-entity id="dk-b" gltf-model="#knight-glb" position="-6.25 0.1 -8.75" chess-material="color:dark"></a-entity>
  <a-entity id="db-c" gltf-model="#bishop-glb" position="-3.75 0.1 -8.75" chess-material="color:dark"></a-entity>
  <a-entity id="dq"   gltf-model="#queen-glb"  position="-1.25 0.1 -8.75" chess-material="color:dark"></a-entity>
  <a-entity id="dk"   gltf-model="#king-glb"   position=" 1.25 0.1 -8.75" chess-material="color:dark"></a-entity>
  <a-entity id="db-f" gltf-model="#bishop-glb" position=" 3.75 0.1 -8.75" chess-material="color:dark"></a-entity>
  <a-entity id="dk-g" gltf-model="#knight-glb" position=" 6.25 0.1 -8.75" chess-material="color:dark"></a-entity>
  <a-entity id="dr-h" gltf-model="#rook-glb"   position=" 8.75 0.1 -8.75" chess-material="color:dark"></a-entity>
  <!-- Pawns -->
  <a-entity id="bp-a" gltf-model="#pawn-glb" position="-8.75 0.1 -6.25" chess-material="color:dark"></a-entity>
  <a-entity id="bp-b" gltf-model="#pawn-glb" position="-6.25 0.1 -6.25" chess-material="color:dark"></a-entity>
  <a-entity id="bp-c" gltf-model="#pawn-glb" position="-3.75 0.1 -6.25" chess-material="color:dark"></a-entity>
  <a-entity id="bp-d" gltf-model="#pawn-glb" position="-1.25 0.1 -6.25" chess-material="color:dark"></a-entity>
  <a-entity id="bp-e" gltf-model="#pawn-glb" position=" 1.25 0.1 -6.25" chess-material="color:dark"></a-entity>
  <a-entity id="bp-f" gltf-model="#pawn-glb" position=" 3.75 0.1 -6.25" chess-material="color:dark"></a-entity>
  <a-entity id="bp-g" gltf-model="#pawn-glb" position=" 6.25 0.1 -6.25" chess-material="color:dark"></a-entity>
  <a-entity id="bp-h" gltf-model="#pawn-glb" position=" 8.75 0.1 -6.25" chess-material="color:dark"></a-entity>

  <!-- LIGHT SIDE (near/south, z = 8.75 back row, 6.25 pawns) -->
  <!-- Pawns -->
  <a-entity id="wp-a" gltf-model="#pawn-glb" position="-8.75 0.1 6.25" chess-material="color:light"></a-entity>
  <a-entity id="wp-b" gltf-model="#pawn-glb" position="-6.25 0.1 6.25" chess-material="color:light"></a-entity>
  <a-entity id="wp-c" gltf-model="#pawn-glb" position="-3.75 0.1 6.25" chess-material="color:light"></a-entity>
  <a-entity id="wp-d" gltf-model="#pawn-glb" position="-1.25 0.1 6.25" chess-material="color:light"></a-entity>
  <a-entity id="wp-e" gltf-model="#pawn-glb" position=" 1.25 0.1 6.25" chess-material="color:light"></a-entity>
  <a-entity id="wp-f" gltf-model="#pawn-glb" position=" 3.75 0.1 6.25" chess-material="color:light"></a-entity>
  <a-entity id="wp-g" gltf-model="#pawn-glb" position=" 6.25 0.1 6.25" chess-material="color:light"></a-entity>
  <a-entity id="wp-h" gltf-model="#pawn-glb" position=" 8.75 0.1 6.25" chess-material="color:light"></a-entity>
  <!-- Back row -->
  <a-entity id="lr-a"    gltf-model="#rook-glb"   position="-8.75 0.1 8.75" chess-material="color:light"></a-entity>
  <a-entity id="lk-b"    gltf-model="#knight-glb" position="-6.25 0.1 8.75" chess-material="color:light"></a-entity>
  <a-entity id="lb-c"    gltf-model="#bishop-glb" position="-3.75 0.1 8.75" chess-material="color:light"></a-entity>
  <a-entity id="lq"      gltf-model="#queen-glb"  position="-1.25 0.1 8.75" chess-material="color:light"></a-entity>
  <a-entity id="lk-king" gltf-model="#king-glb"   position=" 1.25 0.1 8.75" chess-material="color:light"></a-entity>
  <a-entity id="lb-f"    gltf-model="#bishop-glb" position=" 3.75 0.1 8.75" chess-material="color:light"></a-entity>
  <a-entity id="lk-g"    gltf-model="#knight-glb" position=" 6.25 0.1 8.75" chess-material="color:light"></a-entity>
  <a-entity id="lr-h"    gltf-model="#rook-glb"   position=" 8.75 0.1 8.75" chess-material="color:light"></a-entity>


  <!-- ═══════════════════════════════════════════════════════ -->
  <!--  FIRE BRAZIERS — 4 corners of board like the movie     -->
  <!-- ═══════════════════════════════════════════════════════ -->

  <!-- Plaza-corner braziers hugging the board edge -->
  <a-entity position="-11 0 -11" brazier>
    <a-light type="point" color="#FF8822" distance="18" decay="1.6" position="0 1.3 0" flicker="base:1.6;range:0.5;speed:8"></a-light>
  </a-entity>
  <a-entity position="11 0 -11" brazier>
    <a-light type="point" color="#FF8822" distance="18" decay="1.6" position="0 1.3 0" flicker="base:1.5;range:0.45;speed:9"></a-light>
  </a-entity>
  <a-entity position="-11 0 11" brazier>
    <a-light type="point" color="#FF9933" distance="18" decay="1.6" position="0 1.3 0" flicker="base:1.4;range:0.4;speed:10"></a-light>
  </a-entity>
  <a-entity position="11 0 11" brazier>
    <a-light type="point" color="#FF9933" distance="18" decay="1.6" position="0 1.3 0" flicker="base:1.5;range:0.5;speed:7"></a-light>
  </a-entity>
  <!-- Elevated torches on castle walls flanking the plaza -->
  <a-entity position="-14 5 -4" brazier>
    <a-light type="point" color="#FF7711" distance="22" decay="1.7" position="0 1.3 0" flicker="base:1.3;range:0.4;speed:7"></a-light>
  </a-entity>
  <a-entity position="-14 5 4" brazier>
    <a-light type="point" color="#FF7711" distance="22" decay="1.7" position="0 1.3 0" flicker="base:1.2;range:0.35;speed:9"></a-light>
  </a-entity>
  <a-entity position="14 5 -4" brazier>
    <a-light type="point" color="#FF7711" distance="22" decay="1.7" position="0 1.3 0" flicker="base:1.4;range:0.4;speed:8"></a-light>
  </a-entity>
  <a-entity position="14 5 4" brazier>
    <a-light type="point" color="#FF7711" distance="22" decay="1.7" position="0 1.3 0" flicker="base:1.1;range:0.45;speed:11"></a-light>
  </a-entity>


  <!-- ═══════════════════════════════════════════════════════ -->
  <!--  LIGHTING                                              -->
  <!-- ═══════════════════════════════════════════════════════ -->

  <!-- Strong moonlight from above-left -->
  <a-light type="directional" color="#5577DD" intensity="5.0"
    position="-10 30 -15" cast-shadow="true"
    shadow-camera-left="-30" shadow-camera-right="30"
    shadow-camera-top="30" shadow-camera-bottom="-30"
    shadow-map-height="2048" shadow-map-width="2048"></a-light>

  <!-- Blue fill from the right -->
  <a-light type="directional" color="#3355AA" intensity="2.0"
    position="15 20 10"></a-light>

  <!-- Board overhead glow — dramatic spotlight on the game -->
  <a-light type="point" color="#8899DD" intensity="2.0" distance="25" decay="1.5" position="0 10 0"></a-light>

  <!-- Ambient -->
  <a-light type="ambient" color="#101828" intensity="0.6"></a-light>

  <!-- ═══ STONE CHAMBER (Mirror of Erised) — hidden until after checkmate ═══ -->
  <a-entity id="stoneChamber" stone-chamber-inner stone-reveal visible="false">
    <!-- warm key lights -->
    <a-light type="point" color="#ffc878" intensity="6.0" distance="40" decay="1.4" position="0 10 0"></a-light>
    <a-light type="point" color="#ffa858" intensity="3.5" distance="28" decay="1.5" position="0 6 -10"></a-light>
    <a-light type="ambient" color="#4a3824" intensity="1.4"></a-light>
    <!-- torches flanking the mirror -->
    <a-entity position="-8 0 18" brazier>
      <a-light type="point" color="#ff7d28" distance="14" decay="1.8" position="0 1.3 0" flicker="base:1.2;range:0.4;speed:8"></a-light>
    </a-entity>
    <a-entity position="8 0 18" brazier>
      <a-light type="point" color="#ff7d28" distance="14" decay="1.8" position="0 1.3 0" flicker="base:1.2;range:0.4;speed:9"></a-light>
    </a-entity>
    <a-entity position="-14 0 0" brazier>
      <a-light type="point" color="#ff8a3a" distance="14" decay="1.8" position="0 1.3 0" flicker="base:1.1;range:0.35;speed:7"></a-light>
    </a-entity>
    <a-entity position="14 0 0" brazier>
      <a-light type="point" color="#ff8a3a" distance="14" decay="1.8" position="0 1.3 0" flicker="base:1.1;range:0.35;speed:10"></a-light>
    </a-entity>

    <!-- Four chess piece trophies on pedestals — the original printable set preserved -->
    <a-entity id="trophy-king"   gltf-model="#king-printable"   position="-8 2.6 16.5" scale=".4 .4 .4" chess-material="color:light"></a-entity>
    <a-entity id="trophy-queen"  gltf-model="#queen-printable"  position=" 8 2.6 16.5" scale=".4 .4 .4" chess-material="color:light"></a-entity>
    <a-entity id="trophy-bishop" gltf-model="#bishop-printable" position="-5 2.6 12.5" scale=".4 .4 .4" chess-material="color:dark"></a-entity>
    <a-entity id="trophy-knight" gltf-model="#knight-printable" position=" 5 2.6 12.5" scale=".4 .4 .4" chess-material="color:dark"></a-entity>

    <!-- Two additional doorways flanking the Mirror of Erised -->
    <a-entity portal-door="label:THE GREAT HALL; destination:great-hall; accent:#f3b247"
              position="-18 0 6" rotation="0 90 0"></a-entity>
    <a-entity portal-door="label:DUMBLEDORE'S OFFICE; destination:dumbledores-office; accent:#8ecbff"
              position=" 18 0 6" rotation="0 -90 0"></a-entity>

    <!-- 3D chamber title — visible in VR. Floats above the ruby stone. -->
    <a-entity id="chamberTitle3D" position="0 8.2 17.8" visible="false">
      <a-text value="The Philosopher's Stone"
              align="center" color="#e7d7a7" width="14"
              position="0 0.7 0" anchor="center"></a-text>
      <a-text value="a mirror, a secret, and the prize"
              align="center" color="#c9a871" width="8"
              position="0 0 0" anchor="center"></a-text>
    </a-entity>

    <!-- 3D trophy nameplates — one per piece. Shown as small labels floating
         just under each piece so VR users can read what they're looking at. -->
    <a-text id="trophyLabelKing"   value="THE KING"   align="center" color="#e7d7a7" width="4"
            position="-8 1.85 16.5" anchor="center" rotation="0 0 0"></a-text>
    <a-text id="trophyLabelQueen"  value="THE QUEEN"  align="center" color="#e7d7a7" width="4"
            position=" 8 1.85 16.5" anchor="center" rotation="0 0 0"></a-text>
    <a-text id="trophyLabelBishop" value="THE BISHOP" align="center" color="#e7d7a7" width="4"
            position="-5 1.85 12.5" anchor="center" rotation="0 0 0"></a-text>
    <a-text id="trophyLabelKnight" value="THE KNIGHT" align="center" color="#e7d7a7" width="4"
            position=" 5 1.85 12.5" anchor="center" rotation="0 0 0"></a-text>
  </a-entity>

  <!-- Night sky gradient -->
  <a-sky material="shader:flat; color:#02020a"></a-sky>

  <!-- Starfield -->
  <a-entity starfield></a-entity>

  <!-- Moon: big soft disc behind the castle, blooming through fog -->
  <a-entity position="35 38 120">
    <a-sphere radius="10"
      material="shader:flat; color:#E4E9F2; emissive:#FFFFFF"></a-sphere>
    <a-sphere radius="14"
      material="shader:flat; color:#A8B4D0; opacity:0.25; transparent:true"></a-sphere>
    <a-sphere radius="22"
      material="shader:flat; color:#6677AA; opacity:0.08; transparent:true"></a-sphere>
  </a-entity>

  <!-- Cold moon key-light from moon direction -->
  <a-light type="directional" color="#AABBEE" intensity="0.8"
    position="35 38 120"></a-light>


  <!-- ═══════════════════════════════════════════════════════ -->
  <!--  CAMERA RIG                                            -->
  <!-- ═══════════════════════════════════════════════════════ -->

  <a-entity id="rig"
    wasd-controls="acceleration:22; fly:true; enabled:false"
    fly-controls="speed:10"
    flyover
    vr-thumbstick-move="speed:3.2; turnSpeed:95"
    boundary="minX:-30; maxX:30; minZ:-30; maxZ:30; minY:0.5; maxY:20">
    <a-camera look-controls="pointerLockEnabled:false; magicWindowTrackingEnabled:false; enabled:false"
      fov="65" near="0.1" far="500">
      <a-cursor raycaster="objects: .clickable-door; far: 60" fuse="false"
        material="color: #ffd080; shader: flat; opacity: 0.55"
        geometry="primitive: ring; radiusInner: 0.008; radiusOuter: 0.012"
        position="0 0 -1"></a-cursor>

      <!-- 3D HUD — controls panel parented to the camera for VR ONLY.
           Hidden by default and on desktop; the scene's enter-vr / exit-vr
           events toggle visibility. Desktop gets the HTML #hud instead. -->
      <a-entity id="vrHud"
        position="-0.28 -0.26 -0.7"
        rotation="-10 18 0"
        visible="false">
        <a-plane width="0.42" height="0.14"
          material="color:#000; opacity:0.72; transparent:true; shader:flat"
          position="0 0 0"></a-plane>
        <a-text id="vrHudText"
          value="L-stick walk  R-stick turn  A open door"
          align="center" color="#ffd680" width="0.78"
          position="0 0 0.005"
          wrap-count="26"></a-text>
      </a-entity>
    </a-camera>

    <!-- VR hand controllers — laser pointers that can click portal doors with the trigger -->
    <a-entity id="leftHand"
      laser-controls="hand: left"
      raycaster="objects: .clickable-door; far: 60; lineColor: #ffd080; lineOpacity: 0.55"></a-entity>
    <a-entity id="rightHand"
      laser-controls="hand: right"
      raycaster="objects: .clickable-door; far: 60; lineColor: #ffd080; lineOpacity: 0.55"></a-entity>
  </a-entity>

</a-scene>

<script>
  // ═══ AMBIENT PAVILION SCORE — original atmospheric sound design ═══
  // A slow cathedral-of-stone bed: sustained drones in natural-minor tonality,
  // with a sparse bell voice that drops one note at random intervals.
  // Everything is synthesized in-browser — nothing external, nothing sampled.
  (function(){
    var ctx = null, master = null, filter = null, started = false;

    function midi2hz(m){ return 440 * Math.pow(2, (m - 69) / 12); }

    // Long-evolving sustained drone voice — sine partials stacked, slow tremolo.
    function startDrone(midi, level){
      var f = midi2hz(midi);
      var droneG = ctx.createGain();
      droneG.gain.setValueAtTime(0.0001, ctx.currentTime);
      droneG.gain.linearRampToValueAtTime(level, ctx.currentTime + 6);
      droneG.connect(filter);

      // Stacked partials — gives the drone a warm organ-ish body
      [1.0, 2.0, 3.0, 4.01].forEach(function(mult, i){
        var o = ctx.createOscillator();
        o.type = i === 0 ? 'sine' : (i === 3 ? 'triangle' : 'sine');
        // Tiny detune per partial to keep the tone alive
        o.frequency.value = f * mult * (1 + (Math.random() - 0.5) * 0.0018);
        var og = ctx.createGain();
        og.gain.value = [0.55, 0.18, 0.08, 0.04][i];
        o.connect(og); og.connect(droneG);
        o.start();
      });

      // Slow tremolo LFO on the drone level
      var lfo = ctx.createOscillator();
      lfo.type = 'sine'; lfo.frequency.value = 0.07 + Math.random() * 0.05;
      var lfoDepth = ctx.createGain();
      lfoDepth.gain.value = level * 0.18;
      lfo.connect(lfoDepth); lfoDepth.connect(droneG.gain);
      lfo.start();

      return droneG;
    }

    // Sparse bell voice — single note that blooms and decays
    function playBell(midi, atTime, dur){
      var f = midi2hz(midi);
      var g = ctx.createGain();
      g.gain.setValueAtTime(0.0001, atTime);
      g.gain.exponentialRampToValueAtTime(0.18, atTime + 0.05);
      g.gain.exponentialRampToValueAtTime(0.0005, atTime + dur);
      g.connect(filter);

      // Bell harmonics
      [[1.0, 'sine', 0.50],
       [2.0, 'sine', 0.22],
       [3.01, 'triangle', 0.08],
       [0.5, 'sine', 0.14]
      ].forEach(function(p){
        var o = ctx.createOscillator();
        o.type = p[1];
        o.frequency.value = f * p[0];
        var og = ctx.createGain(); og.gain.value = p[2];
        o.connect(og); og.connect(g);
        o.start(atTime); o.stop(atTime + dur + 0.2);
      });
    }

    // Schedule the sparse bell layer — one note every 6–14 seconds, drawn
    // from a natural-minor scale so nothing ever clashes with the drones.
    var SCALE = [64, 67, 69, 71, 72, 74, 76, 79, 81, 83]; // E-natural-minor-ish pool
    function scheduleBells(){
      var t = ctx.currentTime + 4;
      for (var i = 0; i < 40; i++) {
        var midi = SCALE[Math.floor(Math.random() * SCALE.length)];
        var dur = 2.5 + Math.random() * 2.5;
        playBell(midi, t, dur);
        t += 6 + Math.random() * 8;
      }
      // Queue the next batch before this one runs out
      setTimeout(function(){ if (started) scheduleBells(); }, (t - ctx.currentTime - 10) * 1000);
    }

    function start(){
      if (started) return;
      started = true;
      ctx = new (window.AudioContext || window.webkitAudioContext)();
      master = ctx.createGain();
      master.gain.value = 0.45;

      // Gentle low-pass shapes the whole bed
      filter = ctx.createBiquadFilter();
      filter.type = 'lowpass';
      filter.frequency.value = 3600;
      filter.Q.value = 0.6;
      filter.connect(master);

      // Stereo-ish reverb via two feedback delays
      var d1 = ctx.createDelay(2.0); d1.delayTime.value = 0.28;
      var d2 = ctx.createDelay(2.0); d2.delayTime.value = 0.45;
      var dg1 = ctx.createGain(); dg1.gain.value = 0.38;
      var dg2 = ctx.createGain(); dg2.gain.value = 0.26;
      master.connect(ctx.destination);
      master.connect(d1); d1.connect(dg1); dg1.connect(ctx.destination); dg1.connect(d2);
      d2.connect(dg2); dg2.connect(ctx.destination);

      if (ctx.state === 'suspended') ctx.resume();

      // Three stacked drones — root, fifth, octave — form the harmonic bed
      startDrone(52, 0.20);   // E3 root
      startDrone(59, 0.14);   // B3 fifth
      startDrone(64, 0.10);   // E4 octave

      // Sparse bell layer
      scheduleBells();
    }

    // ─── Door-open SFX: low wooden thud + squealing hinge creak ───
    function playDoorSound(){
      if (!started) { try { start(); } catch(e){ return; } }
      if (!ctx || !master) return;
      var now = ctx.currentTime;

      // Wooden thud — pitch-drop sine + filtered noise body
      var thudG = ctx.createGain();
      thudG.gain.setValueAtTime(0.0001, now);
      thudG.gain.linearRampToValueAtTime(0.55, now + 0.006);
      thudG.gain.exponentialRampToValueAtTime(0.0008, now + 0.45);
      thudG.connect(master);
      var thudOsc = ctx.createOscillator();
      thudOsc.type = 'sine';
      thudOsc.frequency.setValueAtTime(95, now);
      thudOsc.frequency.exponentialRampToValueAtTime(36, now + 0.35);
      thudOsc.connect(thudG);
      thudOsc.start(now); thudOsc.stop(now + 0.5);

      var nBuf = ctx.createBuffer(1, Math.floor(ctx.sampleRate * 0.28), ctx.sampleRate);
      var nD = nBuf.getChannelData(0);
      for (var i = 0; i < nD.length; i++) nD[i] = (Math.random()*2-1) * (1 - i/nD.length);
      var noise = ctx.createBufferSource(); noise.buffer = nBuf;
      var nFilt = ctx.createBiquadFilter();
      nFilt.type = 'lowpass'; nFilt.frequency.value = 220; nFilt.Q.value = 0.7;
      var nG = ctx.createGain();
      nG.gain.setValueAtTime(0.35, now);
      nG.gain.exponentialRampToValueAtTime(0.001, now + 0.28);
      noise.connect(nFilt); nFilt.connect(nG); nG.connect(master);
      noise.start(now);

      // Hinge creak — bandpassed sawtooth with slow pitch rise + vibrato
      var cStart = now + 0.08;
      var cDur = 1.05;
      var creakG = ctx.createGain();
      creakG.gain.setValueAtTime(0.0001, cStart);
      creakG.gain.linearRampToValueAtTime(0.12, cStart + 0.12);
      creakG.gain.linearRampToValueAtTime(0.085, cStart + cDur * 0.6);
      creakG.gain.exponentialRampToValueAtTime(0.0008, cStart + cDur);
      var creakFilt = ctx.createBiquadFilter();
      creakFilt.type = 'bandpass';
      creakFilt.frequency.setValueAtTime(430, cStart);
      creakFilt.frequency.linearRampToValueAtTime(720, cStart + cDur);
      creakFilt.Q.value = 7;
      creakFilt.connect(creakG); creakG.connect(master);
      var creakOsc = ctx.createOscillator();
      creakOsc.type = 'sawtooth';
      creakOsc.frequency.setValueAtTime(205, cStart);
      creakOsc.frequency.linearRampToValueAtTime(315, cStart + cDur);
      creakOsc.connect(creakFilt);
      var lfo = ctx.createOscillator();
      lfo.type = 'sine'; lfo.frequency.value = 11.5;
      var lfoGain = ctx.createGain(); lfoGain.gain.value = 9;
      lfo.connect(lfoGain); lfoGain.connect(creakOsc.frequency);
      creakOsc.start(cStart); creakOsc.stop(cStart + cDur + 0.05);
      lfo.start(cStart);      lfo.stop(cStart + cDur + 0.05);
    }
    window.addEventListener('door-open-sound', playDoorSound);

    // Bring sound up on the FIRST real user gesture. Chrome/Safari autoplay
    // policy keeps any AudioContext suspended until a click/key/touch — so we
    // wait for one before starting, and we ALSO resume the context every time
    // (so a second gesture will recover from a suspended state).
    function kick(){
      try {
        if (!started) start();
        if (ctx && ctx.state === 'suspended') ctx.resume();
      } catch(e){}
    }
    window.addEventListener('click',      kick);
    window.addEventListener('keydown',    kick);
    window.addEventListener('touchstart', kick, {passive:true});
    window.addEventListener('pointerdown',kick);
  })();

  // ═══ Generate rising ember particles for the cinematic intro ═══
  (function(){
    var field = document.getElementById('emberField');
    if (!field) return;
    for (var i = 0; i < 60; i++) {
      var e = document.createElement('div');
      e.className = 'ember';
      e.style.left = (Math.random() * 100) + '%';
      e.style.width = (1 + Math.random() * 2) + 'px';
      e.style.height = e.style.width;
      e.style.animationDuration = (6 + Math.random() * 7) + 's';
      e.style.animationDelay = (-Math.random() * 8) + 's';
      e.style.setProperty('--sway', ((Math.random() * 80) - 40) + 'px');
      var shade = Math.random();
      if (shade > 0.7) e.style.background = '#ffc078';
      if (shade < 0.2) e.style.background = '#e89045';
      field.appendChild(e);
    }
  })();

  // ═══ Intro: two title cards, ~9s total, then release the flyover ═══
  var intro = document.getElementById('mmdIntro');
  window.__mmdIntroDone = false;
  function endIntro(){

  // ═══ Narrative captions during chess game ═══
