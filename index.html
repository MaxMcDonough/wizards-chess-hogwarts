  // ═══ RON FALLS — dramatic sacrifice moment ═══
  document.addEventListener('ron-falls', function(){
    var ron = document.getElementById('char-ron');
    if (!ron) return;
    // Detach from the piece (so he doesn't get yanked to Y=-2 with the smashed piece)
    var fp = ron.components['follow-piece'];
    if (fp) fp.detach();
    // Freeze Ron's current world position then animate a slow-motion fall
    var curPos = ron.object3D.position.clone();
    ron.setAttribute('animation__fall',
      'property:rotation; to:-85 0 0; dur:1400; easing:easeInQuad');
    ron.setAttribute('animation__arc',
      'property:position; to:' + curPos.x + ' ' + 0.1 + ' ' + (curPos.z + 1.5) +
      '; dur:1400; easing:easeInQuad');
    // Fade out after he's on the ground
    setTimeout(function(){
      ron.setAttribute('animation__fade', 'property:components.material.material.opacity; to:0; dur:1400; delay:1200');
      // Also scale him to nothing slowly so he disappears into the board
      ron.setAttribute('animation__sink', 'property:scale; to:0.01 0.01 0.01; dur:1600; delay:1700; easing:easeInQuad');
    }, 10);
  });

  // ═══ PORTAL DOORS — open a Sketchfab destination ═══
  // We load the embed URL directly (always works). If the Sketchfab Viewer
  // API script is available, we ALSO try to attach it so we can programmatically
  // cycle annotations. If the API attach fails for any reason, the raw embed
  // iframe still works perfectly — the user just can't use the left/right
  // arrow cycling, but the portal is never broken.
  var PORTAL_DESTINATIONS = {
    'great-hall':        { title: 'The Great Hall',        uid: 'bde62298ac8640588d5a2928b8e113dc' },
    'dumbledores-office':{ title: "Dumbledore's Office",   uid: '76caff88cdad4773907b28a33345c501' }
  };
  function embedUrl(uid){
    // autostart=1 loads + plays the model; dark UI with minimal chrome
    return 'https://sketchfab.com/models/' + uid + '/embed' +
      '?autostart=1&ui_theme=dark&ui_infos=0&ui_watermark=0&ui_stop=0';
  }

  var sfApi = null;          // active Sketchfab Viewer API instance (if attached)
  var sfAnnotations = 0;
  var sfAnnotationIdx = -1;

  function sfTryApiAttach(iframeEl, uid){
    // Only try if the Viewer API script actually loaded
    if (typeof Sketchfab === 'undefined') return;
    try {
      var client = new Sketchfab(iframeEl);
      client.init(uid, {
        success: function onSuccess(api){
          api.start();
          api.addEventListener('viewerready', function(){
            sfApi = api;
            api.getAnnotationList(function(err, list){
              if (!err && list) sfAnnotations = list.length;
            });
          });
          api.addEventListener('annotationSelect', function(idx){
            sfAnnotationIdx = idx;
          });
        },
        error: function(){ /* silent — raw embed still plays */ },
        ui_controls:1, ui_infos:0, ui_watermark:0, ui_inspector:0,
        ui_stop:0, ui_vr:0, ui_annotations:1, ui_help:0, ui_settings:0,
        autostart:1, autospin:0
      });
    } catch (e) { /* silent */ }
  }

  function sfGoNextAnnotation(){
    if (!sfApi || sfAnnotations === 0) return;
    sfAnnotationIdx = (sfAnnotationIdx + 1) % sfAnnotations;
    sfApi.gotoAnnotation(sfAnnotationIdx);
  }
  function sfGoPrevAnnotation(){
    if (!sfApi || sfAnnotations === 0) return;
    sfAnnotationIdx = (sfAnnotationIdx - 1 + sfAnnotations) % sfAnnotations;
    sfApi.gotoAnnotation(sfAnnotationIdx);
  }

  document.addEventListener('open-portal', function(evt){
    var dest = evt.detail && evt.detail.destination;
    var info = PORTAL_DESTINATIONS[dest];
    if (!info) return;
    var overlay = document.getElementById('portal-overlay');
    var iframe  = document.getElementById('portal-iframe');
    var title   = document.getElementById('portal-title');
    title.textContent = info.title;
    // Always set the raw embed URL so the portal ALWAYS opens to something,
    // even if the Sketchfab Viewer API fails or its script didn't load.
    iframe.src = embedUrl(info.uid);
    overlay.classList.add('open');
    // Best-effort: also attach the Viewer API so we can cycle annotations.
    // If it fails, no problem — the raw embed above keeps playing.
    // (Give the iframe a moment to attach, then the API will hijack it.)
    sfApi = null; sfAnnotations = 0; sfAnnotationIdx = -1;
    setTimeout(function(){ sfTryApiAttach(iframe, info.uid); }, 300);
  });

  document.getElementById('portal-back').addEventListener('click', function(){
    var overlay = document.getElementById('portal-overlay');
    var iframe  = document.getElementById('portal-iframe');
    overlay.classList.remove('open');
    sfApi = null; sfAnnotations = 0; sfAnnotationIdx = -1;
    setTimeout(function(){ iframe.src = 'about:blank'; }, 900);
    document.dispatchEvent(new CustomEvent('portal-closed'));
  });

  // Keyboard: left / right arrow cycle annotations while the portal is open
  window.addEventListener('keydown', function(e){
    var overlay = document.getElementById('portal-overlay');
    if (!overlay || !overlay.classList.contains('open')) return;
    if (e.key === 'ArrowRight') { sfGoNextAnnotation(); e.preventDefault(); }
    if (e.key === 'ArrowLeft')  { sfGoPrevAnnotation(); e.preventDefault(); }
  });

  // VR D-pad style cycling — fired by vr-thumbstick-move when the left
  // thumbstick is tilted hard left/right (edge-triggered).
  document.addEventListener('vr-dpad', function(evt){
    var overlay = document.getElementById('portal-overlay');
    if (!overlay || !overlay.classList.contains('open')) return;
    if (evt.detail && evt.detail.direction === 'right') sfGoNextAnnotation();
    if (evt.detail && evt.detail.direction === 'left')  sfGoPrevAnnotation();
  });

  // ═══ VR A-BUTTON — context-sensitive action ═══
  // Priority 1: if near a portal door (<8 m), open it.
  // Priority 2: if in the stone chamber, cycle through the four trophy
  //             viewpoints (King → Queen → Bishop → Knight → King...).
  var CHAMBER_VIEWS = [
    { pos: [-8, 1.6, 13.5], look: [-8, 2.6, 16.5], label: 'The King'    },
    { pos: [ 8, 1.6, 13.5], look: [ 8, 2.6, 16.5], label: 'The Queen'   },
    { pos: [-5, 1.6,  9.5], look: [-5, 2.6, 12.5], label: 'The Bishop'  },
    { pos: [ 5, 1.6,  9.5], look: [ 5, 2.6, 12.5], label: 'The Knight'  }
  ];
  var __currentView = -1;

  function moveToChamberView(idx){
    var v = CHAMBER_VIEWS[idx];
    var rig = document.getElementById('rig');
    if (!rig) return;
    rig.object3D.position.set(v.pos[0], v.pos[1], v.pos[2]);
    var m = new THREE.Matrix4();
    m.lookAt(
      new THREE.Vector3(v.pos[0],  v.pos[1],  v.pos[2]),
      new THREE.Vector3(v.look[0], v.look[1], v.look[2]),
      new THREE.Vector3(0, 1, 0)
    );
    rig.object3D.quaternion.setFromRotationMatrix(m);

    // Show the trophy name briefly via the existing stoneTitle overlay
    var st = document.getElementById('stoneTitle');
    if (st) {
      st.textContent = v.label;
      st.classList.add('show');
      setTimeout(function(){ st.classList.remove('show'); }, 2500);
    }
  }

  document.addEventListener('vr-action', function(){
    var rig = document.getElementById('rig');
    if (!rig) return;
    var rigPos = new THREE.Vector3();
    rig.object3D.getWorldPosition(rigPos);

    // — Priority 1: open the nearest portal door in range —
    var nearest = null, nearestD = Infinity;
    document.querySelectorAll('[portal-door]').forEach(function(el){
      if (!el.object3D.visible) return;
      var p = new THREE.Vector3();
      el.object3D.getWorldPosition(p);
      var d = p.distanceTo(rigPos);
      if (d < nearestD) { nearestD = d; nearest = el; }
    });
    if (nearest && nearestD < 8) {
      var comp = nearest.components['portal-door'];
      if (comp && comp._state === 'closed') comp._state = 'opening';
      return;
    }

    // — Priority 2: cycle chamber trophy views —
    var chamber = document.getElementById('stoneChamber');
    if (chamber && chamber.object3D.visible) {
      __currentView = (__currentView + 1) % CHAMBER_VIEWS.length;
      moveToChamberView(__currentView);
    }
  });

  // Desktop keyboard shortcut to fire the same A-button action.
  // 'T' for 'tour' — doesn't collide with wasd-controls.
  window.addEventListener('keydown', function(e){
    if (e.key === 't' || e.key === 'T') {
      document.dispatchEvent(new CustomEvent('vr-action', {detail:{hand:'keyboard'}}));
    }
  });

  // ═══ KING DEFEATED — sword falls from the black king's hand ═══
  document.addEventListener('king-defeated', function(){
    var sword = document.getElementById('dk-sword');
    if (!sword) return;
    // Blade tips over backward, slides off the piece, clatters onto the board
    var p = sword.object3D.position.clone();
    sword.setAttribute('animation__tip',
      'property:rotation; to:95 0 14; dur:850; easing:easeInQuad');
    sword.setAttribute('animation__fall',
      'property:position; to:' + (p.x + 0.2) + ' 0.15 ' + (p.z + 1.1) +
      '; dur:850; easing:easeInQuad');
    // The black king slumps forward a moment later
    var dk = document.getElementById('dk');
    if (dk) {
      dk.setAttribute('animation__bow',
        'property:rotation; to:25 0 0; dur:900; delay:500; easing:easeInOutQuad');
    }
  });

  function revealStoneChamber(){
    // Kill the outdoor scene visibility and swap in the stone chamber
    var castle = document.querySelector('[gltf-model="#castle-glb"]');
    var board  = document.querySelector('[wizard-chessboard]');
    if (castle) castle.object3D.visible = false;
    if (board)  board.object3D.visible  = false;
    document.querySelectorAll('[id^="wp-"],[id^="bp-"],[id^="dr-"],[id^="lr-"],[id^="dk-"],[id^="lk-"],[id^="db-"],[id^="lb-"],#dq,#lq,#dk,#lk-king').forEach(function(e){
      e.object3D.visible = false;
    });
    // hide starfield, night sky, outdoor platform/ground, and outdoor braziers/lights so they don't bleed into the chamber
    var stars = document.querySelector('[starfield]'); if (stars) stars.object3D.visible = false;
    var sky = document.querySelector('a-sky'); if (sky) sky.object3D.visible = false;
    var outPlat = document.getElementById('outdoorPlatform'); if (outPlat) outPlat.object3D.visible = false;
    var outGround = document.getElementById('outdoorGround'); if (outGround) outGround.object3D.visible = false;
    // Also hide the distant moon + its backlight so no stray light bleed
    document.querySelectorAll('a-scene > a-entity').forEach(function(e){
      if (e.querySelector('a-sphere[material*="E4E9F2"]')) e.object3D.visible = false;
    });
    var chamber = document.getElementById('stoneChamber');
    document.querySelectorAll('[brazier]').forEach(function(e){
      if (chamber && !chamber.contains(e)) e.object3D.visible = false;
    });
    document.querySelectorAll('a-scene > a-light').forEach(function(l){ l.object3D.visible = false; });
    // reveal the chamber
    if (chamber) chamber.object3D.visible = true;
    // move camera into chamber
    var rig = document.getElementById('rig');
    var camEl = rig.querySelector('a-camera');
    rig.object3D.position.set(0, 1.6, -6);
    // orient toward the mirror/stone at world origin
    var m = new THREE.Matrix4();
    m.lookAt(rig.object3D.position, new THREE.Vector3(0, 1.2, 0.5), new THREE.Vector3(0,1,0));
    rig.object3D.quaternion.setFromRotationMatrix(m);

    // fade blackout back out
    setTimeout(function(){
      document.getElementById('blackout').classList.remove('on');
    }, 600);

    // reveal stone title (HTML overlay for desktop)
    setTimeout(function(){
      var st = document.getElementById('stoneTitle');
      st.innerHTML = "The Philosopher's Stone<span class=\"tagline\">a mirror, a secret, and the prize</span>";
      st.classList.add('show');
      // Only show the 3D world title in VR (desktop already has the HTML title)
      var sceneEl = document.querySelector('a-scene');
      if (sceneEl && sceneEl.is && sceneEl.is('vr-mode')) {
        var t3d = document.getElementById('chamberTitle3D');
        if (t3d) t3d.setAttribute('visible', true);
      }
    }, 3200);
    setTimeout(function(){
      document.getElementById('stoneTitle').classList.remove('show');
      var t3d = document.getElementById('chamberTitle3D');
      if (t3d) t3d.setAttribute('visible', false);
    }, 9500);

    // kick off the stone chamber's own slow dolly
    if (chamber && chamber.components['stone-reveal']){
      chamber.components['stone-reveal'].trigger();
    }
    // Hand control back to the player once the dolly finishes so they can approach a door
    setTimeout(function(){
      var rig = document.getElementById('rig');
      var cam = rig.querySelector('a-camera');
      rig.setAttribute('wasd-controls', 'enabled', true);
      cam.setAttribute('look-controls', 'enabled', true);
      // Re-show HUD with updated hint
      var hud = document.getElementById('hud');
      hud.innerHTML = '<div class="hud-row">' +
        '<div class="hud-block"><div class="hud-label">Laptop</div>' +
        '<div class="hud-line"><b>WASD</b> walk &middot; <b>Mouse</b> look &middot; <b>T</b> tour trophies &middot; <b>Click</b> a door</div>' +
        '<div class="hud-line"><b>&larr; &rarr;</b> cycle waypoints inside a portal</div></div>' +
        '<div class="hud-block" style="margin-top:4px"><div class="hud-label">VR Headset</div>' +
        '<div class="hud-line"><b>L-stick</b> walk &middot; <b>R-stick</b> turn &middot; <b>A</b> door / trophy tour</div>' +
        '<div class="hud-line"><b>L-stick &larr; &rarr;</b> cycle waypoints in a portal</div></div>' +
        '</div>';
      hud.classList.remove('fade');
      hud.style.opacity = '1';
    }, 12000);
  }

  setTimeout(function(){document.getElementById('hud').classList.add('fade')},40000);

  // ═══ SAFETY-NET TICK LOOP ═══
  // Some A-Frame builds / resume-from-cache states leave the tick loop inactive.
  // This watches for that and drives the same components manually via rAF.
  (function(){
    var watchdogStarted = false;
    function ensureTicking(){
      var scene = AFRAME.scenes && AFRAME.scenes[0];
      if (!scene || !scene.hasLoaded) { setTimeout(ensureTicking, 300); return; }

      // Compare flame scale over ~400ms. If it doesn't change, ticks aren't running.
      var probe = document.querySelector('[brazier]');
      if (!probe) { setTimeout(ensureTicking, 300); return; }
      var flame = null;
      probe.object3D.traverse(function(o){
        if (o.isMesh && o.material && o.material.color && o.material.color.r > 0.9) flame = o;
      });
      if (!flame) { setTimeout(ensureTicking, 300); return; }
      var before = flame.scale.y;
      setTimeout(function(){
        var after = flame.scale.y;
        if (Math.abs(after - before) < 0.001) {
          // Ticks not running — start manual driver
          startManualDriver();
        }
      }, 500);
    }

    function startManualDriver(){
      if (watchdogStarted) return;
      watchdogStarted = true;
      console.log('[mmd] Starting manual tick driver — A-Frame tick loop not advancing');
      var rAF = window.requestAnimationFrame;
      function loop(){
        var t = performance.now();
        var scene = AFRAME.scenes[0];
        var b = scene && scene.behaviors;
        if (b) {
          // Collect all components with a tick method across every registered behavior bucket
          Object.keys(b).forEach(function(name){
            var bucket = b[name];
            if (!bucket || !bucket.tick || !bucket.tick.array) return;
            var arr = bucket.tick.array;
            for (var i = 0; i < arr.length; i++) {
              var c = arr[i];
              if (c && typeof c.tick === 'function') {
                try { c.tick(t, 16); } catch(e){}
              }
            }
          });
        }
        rAF(loop);
      }
      rAF(loop);
    }

    ensureTicking();
  })();
</script>
